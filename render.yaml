# Render blueprint — infrastructure as code.
#
# Point Render at this repo (New → Blueprint) and it provisions the API service,
# auto-generating the JWT secrets. You supply the handful of `sync: false` values
# during the launch flow.
#
# NOTE: this blueprint does NOT create a database. It wires the API to the
# PostgreSQL instance you already created — you paste its Internal URL into
# DATABASE_URL at launch. (Creating one here would make a second, empty database
# and ignore the one you have set up.)

services:
  - type: web
    name: campus-career-hub-api
    runtime: node
    plan: free
    region: singapore
    branch: main

    buildCommand: npm ci && npm run build -w @cch/shared && npm run build -w @cch/api

    # Migrations run BEFORE the new code is live, so a release that needs a new
    # column never starts serving traffic against a schema that lacks it.
    preDeployCommand: npm run db:migrate -w @cch/api

    startCommand: node apps/api/dist/index.js

    # Render polls this. It reports the DATABASE's real state, not just "the
    # process is alive" — an instance that cannot reach Postgres is taken out of
    # rotation rather than left to serve 500s.
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      # Paste the INTERNAL Database URL of your existing Render PostgreSQL.
      # Internal (not External) keeps DB traffic on Render's private network.
      - key: DATABASE_URL
        sync: false

      # Generated by Render, never committed. Access and refresh secrets MUST
      # differ — the API refuses to boot if they match.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: BCRYPT_ROUNDS
        value: '12'

      # Set this to your Vercel domain. No wildcard: the browser refuses to send
      # credentials to `Access-Control-Allow-Origin: *`, so cookie auth would
      # silently stop working.
      - key: CORS_ORIGINS
        sync: false

      - key: LOG_LEVEL
        value: info

      # Optional. Without them, image uploads return 503 and the admin UI falls
      # back to pasting an image URL — the feature degrades rather than breaks.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # The API refuses to start in production with the default seed password.
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
